<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Blood Bank</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    body { background: linear-gradient(135deg,#1A1D2E 0%,#2C2F45 60%,#3D1A18 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .auth-wrap { width:100%; max-width:420px; }
    .auth-card { background:#fff; border-radius:24px; padding:40px 36px; box-shadow:0 24px 64px rgba(0,0,0,0.25); }
    .auth-logo  { text-align:center; margin-bottom:28px; }
    .auth-logo .logo-icon { width:56px;height:56px;background:var(--red-primary);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:12px; }
    .auth-logo h2 { font-size:1.5rem;color:var(--text-dark); }
    .auth-logo p  { color:var(--text-light);font-size:0.88rem;margin-top:4px; }
    .role-tabs { display:flex;gap:6px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px; }
    .role-tab  { flex:1;padding:8px;border:none;border-radius:8px;font-family:var(--font-main);font-size:0.83rem;font-weight:600;cursor:pointer;background:transparent;color:var(--text-light);transition:var(--transition); }
    .role-tab.active { background:#fff;color:var(--red-primary);box-shadow:var(--shadow-sm); }
    .auth-footer { text-align:center;margin-top:20px;font-size:0.88rem;color:var(--text-light); }
    .auth-footer a { color:var(--red-primary);font-weight:600; }
    .divider { text-align:center;color:var(--text-light);font-size:0.82rem;margin:12px 0;position:relative; }
    .divider::before,.divider::after { content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border); }
    .divider::before { left:0; } .divider::after { right:0; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🩸</div>
        <h2>Welcome Back</h2>
        <p>Sign in to your Blood Bank account</p>
      </div>

      <!-- Role selector tabs -->
      <div class="role-tabs">
        <button class="role-tab" data-role="admin"    onclick="setRole('admin',this)">🛡️ Admin</button>
        <button class="role-tab" data-role="donor"    onclick="setRole('donor',this)">🩸 Donor</button>
        <button class="role-tab" data-role="hospital" onclick="setRole('hospital',this)">🏥 Hospital</button>
      </div>

      <div id="alertBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
      <div class="auth-footer" style="margin-top:8px;">
        <a href="../index.html">← Back to home</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Pre-select role from URL param
    const urlRole = new URLSearchParams(window.location.search).get('role') || 'donor';
    function setRole(role, el) {
      document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
    }
    setRole(urlRole, document.querySelector(`[data-role="${urlRole}"]`));
  </script>
  <div id="toast"></div>
</body>
</html>
