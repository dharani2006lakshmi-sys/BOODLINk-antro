<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LifeFlow · Hospitals</title>
  <style>
/* ═══════════════════════════════════════
   LifeFlow — Blood Bank Management System
   assets/css/style.css
═══════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

/* ─── CSS VARIABLES ─── */
:root {
  --red:      #C8102E;
  --red-dark: #8B0000;
  --red-light:#FF4D6D;
  --bg:       #0A0A0B;
  --surface:  #131316;
  --surface2: #1C1C21;
  --border:   rgba(200,16,46,0.2);
  --text:     #F0EEE9;
  --muted:    #7A7880;
  --green:    #2ECC71;
  --yellow:   #F1C40F;
  --blue:     #3498DB;
}

/* ─── RESET ─── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
a { text-decoration:none; color:inherit; }
button { font-family:'DM Sans',sans-serif; }

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
.app  { display:flex; min-height:100vh; }
.main { flex:1; margin-left:240px; display:flex; flex-direction:column; min-height:100vh; }

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
.sidebar {
  width:240px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0;
  height:100vh;
  z-index:100;
}

.sidebar-logo {
  padding:22px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
}
.logo-icon {
  width:36px; height:36px;
  background:var(--red);
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  flex-shrink:0;
}
.logo-text { font-family:'Bebas Neue'; font-size:22px; letter-spacing:2px; }

.sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
.nav-section  { margin-bottom:22px; }
.nav-label    { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; padding:0 8px; margin-bottom:8px; display:block; }

.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px;
  color:var(--muted); font-size:13px; font-weight:500;
  transition:background .15s, color .15s;
  margin-bottom:2px;
  cursor:pointer;
}
.nav-item:hover  { background:var(--surface2); color:var(--text); }
.nav-item.active { background:rgba(200,16,46,0.12); color:var(--red-light); }
.nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }

.sidebar-user {
  padding:14px 18px;
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.user-avatar {
  width:32px; height:32px;
  background:var(--red); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px; flex-shrink:0;
}
.user-info { flex:1; min-width:0; }
.user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-role { font-size:11px; color:var(--muted); }
.logout-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; transition:color .2s; flex-shrink:0; }
.logout-btn:hover { color:var(--red-light); }

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
.topbar {
  padding:16px 28px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:10;
}
.page-title    { font-family:'Bebas Neue'; font-size:26px; letter-spacing:2px; }
.page-subtitle { font-size:12px; color:var(--muted); margin-top:2px; }
.topbar-actions { display:flex; gap:10px; align-items:center; }

/* ════════════════════════════════════════
   CONTENT AREA
════════════════════════════════════════ */
.content { flex:1; padding:28px; overflow-y:auto; }

/* ════════════════════════════════════════
   BUTTONS
════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 18px; border-radius:8px; border:none;
  cursor:pointer; font-weight:600; font-size:13px;
  transition:all .2s; text-decoration:none; white-space:nowrap;
}
.btn-primary { background:var(--red); color:#fff; }
.btn-primary:hover { background:#e8102e; transform:translateY(-1px); box-shadow:0 8px 20px rgba(200,16,46,.35); }

.btn-outline { background:transparent; color:var(--text); border:1px solid rgba(255,255,255,0.15); }
.btn-outline:hover { border-color:var(--red); color:var(--red-light); }

.btn-green  { background:rgba(46,204,113,.15); color:var(--green); border:1px solid rgba(46,204,113,.3); }
.btn-green:hover { background:rgba(46,204,113,.25); }

.btn-danger { background:rgba(200,16,46,.12); color:var(--red-light); border:1px solid rgba(200,16,46,.3); }
.btn-danger:hover { background:rgba(200,16,46,.22); }

.btn-sm  { padding:6px 13px; font-size:12px; }
.btn-xs  { padding:4px 9px;  font-size:11px; }
.btn-full{ width:100%; }

/* ════════════════════════════════════════
   CARDS
════════════════════════════════════════ */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:22px;
}
.card + .card { margin-top:16px; }
.card-title {
  font-size:13px; font-weight:600;
  margin-bottom:16px;
  display:flex; justify-content:space-between; align-items:center; gap:12px;
}

/* ════════════════════════════════════════
   STAT CARDS
════════════════════════════════════════ */
.stat-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px; padding:20px;
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
  background:var(--red);
}
.stat-card.green::before  { background:var(--green); }
.stat-card.blue::before   { background:var(--blue); }
.stat-card.yellow::before { background:var(--yellow); }

.stat-icon  { position:absolute; right:16px; top:16px; font-size:26px; opacity:.15; pointer-events:none; }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.stat-value { font-family:'Bebas Neue'; font-size:38px; line-height:1; }
.stat-unit  { font-size:12px; color:var(--muted); margin-top:4px; }

/* ════════════════════════════════════════
   GRID LAYOUTS
════════════════════════════════════════ */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.grid-2     { display:grid; grid-template-columns:1fr 1fr;          gap:16px; margin-bottom:16px; }
.grid-3     { display:grid; grid-template-columns:repeat(3,1fr);    gap:16px; margin-bottom:16px; }

/* ════════════════════════════════════════
   TABLE
════════════════════════════════════════ */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th {
  padding:9px 14px; text-align:left;
  color:var(--muted); font-size:11px; letter-spacing:1px; text-transform:uppercase;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody tr { border-bottom:1px solid rgba(255,255,255,.04); transition:background .15s; }
tbody tr:hover { background:var(--surface2); }
tbody td { padding:11px 14px; }

/* ════════════════════════════════════════
   BADGES
════════════════════════════════════════ */
.badge {
  display:inline-flex; align-items:center;
  padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:600; white-space:nowrap;
}
.badge-red    { background:rgba(200,16,46,.15);   color:var(--red-light); }
.badge-green  { background:rgba(46,204,113,.15);  color:var(--green); }
.badge-yellow { background:rgba(241,196,15,.15);  color:var(--yellow); }
.badge-blue   { background:rgba(52,152,219,.15);  color:var(--blue); }
.badge-muted  { background:rgba(255,255,255,.07); color:var(--muted); }

.blood-badge {
  display:inline-block;
  padding:2px 8px; border-radius:4px;
  background:rgba(200,16,46,.2); color:var(--red-light);
  font-family:'DM Mono'; font-size:12px; font-weight:500;
}

/* ════════════════════════════════════════
   ALERTS
════════════════════════════════════════ */
.alert {
  padding:11px 16px; border-radius:8px; font-size:13px;
  margin-bottom:12px; display:flex; align-items:center; gap:10px;
}
.alert-critical { background:rgba(200,16,46,.10); border:1px solid rgba(200,16,46,.3); color:var(--red-light); }
.alert-warning  { background:rgba(241,196,15,.10); border:1px solid rgba(241,196,15,.3); color:var(--yellow); }
.alert-success  { background:rgba(46,204,113,.10); border:1px solid rgba(46,204,113,.3); color:var(--green); }

/* ════════════════════════════════════════
   MODAL
════════════════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:999;
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open { display:flex; }

.modal {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px; padding:32px;
  width:500px; max-width:95vw;
  max-height:90vh; overflow-y:auto;
  animation:slideUp .3s ease;
}
.modal-title {
  font-size:17px; font-weight:700;
  margin-bottom:22px;
  display:flex; justify-content:space-between; align-items:center;
}
.modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; transition:color .2s; }
.modal-close:hover { color:var(--text); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }

/* ════════════════════════════════════════
   FORMS
════════════════════════════════════════ */
.form-group { margin-bottom:16px; }
.form-group label {
  font-size:11px; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase;
  display:block; margin-bottom:7px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width:100%;
  background:var(--surface2);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px; padding:11px 14px;
  color:var(--text); font-family:'DM Sans'; font-size:13px;
  outline:none; transition:border .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color:var(--red); }
.form-group select option { background:var(--surface2); }
.form-group textarea { resize:vertical; min-height:80px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

/* ════════════════════════════════════════
   PROGRESS BARS
════════════════════════════════════════ */
.progress { height:5px; background:var(--surface2); border-radius:3px; }
.progress-fill { height:5px; border-radius:3px; background:var(--red); transition:width .6s ease; }
.progress-fill.green  { background:var(--green); }
.progress-fill.blue   { background:var(--blue); }
.progress-fill.yellow { background:var(--yellow); }

/* ════════════════════════════════════════
   BLOOD GROUP INVENTORY GRID
════════════════════════════════════════ */
.blood-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.blood-cell { background:var(--surface2); border-radius:8px; padding:12px 8px; text-align:center; }
.blood-type  { font-family:'Bebas Neue'; font-size:22px; color:var(--red-light); }
.blood-units { font-size:11px; color:var(--muted); margin-top:2px; }
.blood-bar   { height:3px; background:var(--bg); border-radius:2px; margin-top:6px; }
.blood-fill  { height:3px; background:var(--red); border-radius:2px; }

/* ════════════════════════════════════════
   VITALS CARDS
════════════════════════════════════════ */
.vital-card  { background:var(--surface2); border-radius:10px; padding:16px; border:1px solid transparent; transition:border .3s; }
.vital-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.vital-value { font-family:'Bebas Neue'; font-size:30px; line-height:1; }
.vital-unit  { font-size:11px; color:var(--muted); margin-top:2px; }
.vital-status { margin-top:6px; }

/* ════════════════════════════════════════
   LEADERBOARD ROW
════════════════════════════════════════ */
.leaderboard-row { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--surface2); border-radius:8px; }
.rank { font-family:'Bebas Neue'; font-size:24px; width:28px; flex-shrink:0; }

/* ════════════════════════════════════════
   LOGIN PAGE
════════════════════════════════════════ */
.login-page {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
}
.login-bg {
  position:fixed; inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,16,46,.15) 0%, transparent 70%);
  pointer-events:none;
}
.login-bg::after {
  content:'LifeFlow';
  position:absolute; font-family:'Bebas Neue'; font-size:28vw;
  color:rgba(200,16,46,.03);
  top:50%; left:50%; transform:translate(-50%,-50%);
  white-space:nowrap; pointer-events:none;
}
.login-card {
  position:relative; z-index:1;
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:48px; width:420px; max-width:95vw;
  box-shadow:0 40px 80px rgba(0,0,0,.6);
  animation:slideUp .5s ease;
}
.login-logo { display:flex; align-items:center; gap:12px; margin-bottom:30px; }
.login-logo .logo-icon { width:46px; height:46px; border-radius:10px; font-size:24px; }
.login-logo .logo-text { font-family:'Bebas Neue'; font-size:30px; letter-spacing:3px; }
.login-title    { font-size:22px; font-weight:600; margin-bottom:6px; }
.login-subtitle { color:var(--muted); font-size:13px; margin-bottom:28px; }
.login-links { margin-top:20px; display:flex; flex-direction:column; gap:6px; text-align:center; }
.login-links a { font-size:12px; color:var(--muted); }
.login-links a:hover { color:var(--red-light); }
.login-demo { margin-top:14px; text-align:center; font-size:12px; color:var(--muted); }

/* ════════════════════════════════════════
   REPORT PAGE EXTRAS
════════════════════════════════════════ */
.report-header { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:20px; }
.report-title  { font-family:'Bebas Neue'; font-size:30px; letter-spacing:2px; color:var(--red-light); }
.report-meta   { font-size:12px; color:var(--muted); margin-top:4px; }
.filter-row    { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; align-items:flex-end; }
.filter-group  { display:flex; flex-direction:column; gap:4px; }
.filter-group label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.filter-group select,
.filter-group input {
  background:var(--surface2); border:1px solid rgba(255,255,255,.1);
  border-radius:6px; padding:8px 12px; color:var(--text); font-size:13px; outline:none;
}

/* ════════════════════════════════════════
   AUDIT LOG ROW
════════════════════════════════════════ */
.audit-row {
  padding:8px 10px; background:var(--surface2); border-radius:6px;
  display:flex; gap:10px; font-size:12px; align-items:flex-start;
}
.audit-time { color:var(--muted); white-space:nowrap; flex-shrink:0; }

/* ════════════════════════════════════════
   SCROLLBAR
════════════════════════════════════════ */
::-webkit-scrollbar       { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:rgba(200,16,46,.4); }

/* ════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════ */
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media (max-width:1100px) {
  .stats-grid { grid-template-columns:repeat(2,1fr); }
}
@media (max-width:860px) {
  .grid-2, .grid-3 { grid-template-columns:1fr; }
  .sidebar { transform:translateX(-100%); transition:transform .3s; }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; }
}
@media (max-width:500px) {
  .stats-grid { grid-template-columns:1fr; }
  .form-row   { grid-template-columns:1fr; }
  .content    { padding:16px; }
  .topbar     { padding:12px 16px; }
}

/* SPINNER */
.spinner { display:inline-block;width:20px;height:20px;border:2px solid rgba(200,16,46,.3);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

</style>
</head>
<body>
<div class="app">
  <div id="sidebarMount"></div>
  <div class="main">
    <div class="topbar">
      <div><div class="page-title">Hospitals</div><div class="page-subtitle">Partner Hospitals &amp; Blood Requests — Firebase</div></div>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" onclick="openModal('reqModal')">+ Blood Request</button>
        <button class="btn btn-primary btn-sm" onclick="openModal('hospModal')">+ Add Hospital</button>
      </div>
    </div>
    <div class="content">
      <div class="grid-3" style="margin-bottom:20px">
        <div class="stat-card blue">  <div class="stat-label">Partner Hospitals</div><div class="stat-value" id="cHosp"><div class="spinner"></div></div></div>
        <div class="stat-card">       <div class="stat-label">Pending Requests</div><div class="stat-value" id="cPend"><div class="spinner"></div></div></div>
        <div class="stat-card green"> <div class="stat-label">Fulfilled Requests</div><div class="stat-value" id="cFul"><div class="spinner"></div></div></div>
      </div>

      <!-- HOSPITALS TABLE -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Hospital Directory</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>District</th><th>Phone</th><th>Contact</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="hospBody"><tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- REQUESTS LOG -->
      <div class="card">
        <div class="card-title">Blood Requests Log</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Hospital</th><th>Blood</th><th>Units</th><th>Priority</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="reqBody"><tr><td colspan="7" style="text-align:center;padding:30px;color:var(--muted)"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD HOSPITAL MODAL -->
<div class="modal-overlay" id="hospModal">
  <div class="modal">
    <div class="modal-title">Add Partner Hospital <button class="modal-close" onclick="closeModal('hospModal')">✕</button></div>
    <div class="form-group"><label>Hospital Name *</label><input id="hName" type="text" placeholder="Hospital Name"></div>
    <div class="form-row">
      <div class="form-group"><label>District</label><input id="hDist"  type="text" placeholder="Chennai Central"></div>
      <div class="form-group"><label>Phone</label>   <input id="hPhone" type="text" placeholder="044-XXXX-XXXX"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Contact Person</label><input id="hContact" type="text"  placeholder="Dr. Name"></div>
      <div class="form-group"><label>Email</label>          <input id="hEmail"   type="email" placeholder="hospital@email.com"></div>
    </div>
    <div class="form-group"><label>Address</label><input id="hAddr" type="text" placeholder="Full address"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('hospModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addHospital()">Add Hospital</button>
    </div>
  </div>
</div>

<!-- BLOOD REQUEST MODAL -->
<div class="modal-overlay" id="reqModal">
  <div class="modal">
    <div class="modal-title">New Blood Request <button class="modal-close" onclick="closeModal('reqModal')">✕</button></div>
    <div class="form-group"><label>Hospital Name *</label><input id="rHosp" type="text" placeholder="Hospital name" list="hospList">
      <datalist id="hospList"></datalist>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Blood Group *</label>
        <select id="rBlood"><option value="">Select</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
        </select>
      </div>
      <div class="form-group"><label>Units Required</label><input id="rUnits" type="number" placeholder="5"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Priority</label>
        <select id="rPrio"><option>Normal</option><option>High</option><option>Critical</option></select>
      </div>
      <div class="form-group"><label>Required By</label><input id="rDate" type="date"></div>
    </div>
    <div class="form-group"><label>Remarks</label><input id="rRemarks" type="text" placeholder="Patient / ward / purpose"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('reqModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addRequest()">Submit Request</button>
    </div>
  </div>
</div>

<!-- Bridge -->
<script>
function addHospital(){if(window.addHospital)window.addHospital();}
function addRequest(){if(window.addRequest)window.addRequest();}
function doLogout(){if(window.doLogout)window.doLogout();}
function fulfilReq(){if(window.fulfilReq)window.fulfilReq();}
function prefillRequest(){if(window.prefillRequest)window.prefillRequest();}
</script>
<script type="module">
  import { db, auth } from './assets/js/firebase-config.js';
  import { initPage } from './assets/js/auth-guard.js';
  import { collection, addDoc, getDocs, onSnapshot, query, orderBy, doc, updateDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  window.doLogout = () => signOut(auth).then(() => location.href='login.html');
  initPage('hospitals', () => {

  // ── Load Hospitals ─────────────────────────────────
  onSnapshot(collection(db,'hospitals'), snap => {
    document.getElementById('cHosp').textContent = snap.size;
    const hospList = document.getElementById('hospList');
    if (snap.empty) {
      document.getElementById('hospBody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">No hospitals yet</td></tr>';
      return;
    }
    document.getElementById('hospBody').innerHTML = snap.docs.map(d => {
      const h = d.data();
      hospList.innerHTML += `<option value="${h.name}">`;
      return `<tr>
        <td>${h.name}</td><td>${h.district||'—'}</td><td>${h.phone||'—'}</td>
        <td>${h.contact_person||'—'}</td>
        <td><span class="badge badge-green">${h.status||'Active'}</span></td>
        <td><button class="btn btn-outline btn-sm" onclick="prefillRequest('${h.name}')">Request Blood</button></td>
      </tr>`;
    }).join('');
  });

  // ── Load Requests ──────────────────────────────────
  onSnapshot(query(collection(db,'blood_requests'), orderBy('requested_at','desc')), snap => {
    document.getElementById('cPend').textContent = snap.docs.filter(d=>d.data().status==='Pending').length;
    document.getElementById('cFul').textContent  = snap.docs.filter(d=>d.data().status==='Fulfilled').length;
    if (snap.empty) {
      document.getElementById('reqBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">No requests yet</td></tr>';
      return;
    }
    const pCls = { Critical:'badge-red', High:'badge-yellow', Normal:'badge-blue' };
    const sCls = { Pending:'badge-yellow', Fulfilled:'badge-green', Rejected:'badge-red' };
    document.getElementById('reqBody').innerHTML = snap.docs.map(d => {
      const r = d.data();
      const dt = r.requested_at?.toDate ? r.requested_at.toDate().toLocaleDateString('en-IN') : '—';
      const action = r.status==='Pending'
        ? `<button class="btn btn-green btn-sm" onclick="fulfilReq('${d.id}')">Fulfil</button>`
        : '—';
      return `<tr>
        <td>${r.hospital_name}</td>
        <td><span class="blood-badge">${r.blood_group}</span></td>
        <td>${r.units_required}</td>
        <td><span class="badge ${pCls[r.priority]||'badge-blue'}">${r.priority}</span></td>
        <td>${dt}</td>
        <td><span class="badge ${sCls[r.status]||'badge-muted'}">${r.status}</span></td>
        <td>${action}</td>
      </tr>`;
    }).join('');
  });

  window.addHospital = async () => {
    const name = document.getElementById('hName').value.trim();
    if (!name) { showToast('Hospital name is required','error'); return; }
    await addDoc(collection(db,'hospitals'), {
      name, district: document.getElementById('hDist').value,
      phone: document.getElementById('hPhone').value,
      contact_person: document.getElementById('hContact').value,
      email: document.getElementById('hEmail').value,
      address: document.getElementById('hAddr').value,
      status:'Active', created_at: new Date()
    });
    closeModal('hospModal');
    showToast('Hospital added!');
  };

  window.addRequest = async () => {
    const hosp  = document.getElementById('rHosp').value.trim();
    const blood = document.getElementById('rBlood').value;
    if (!hosp || !blood) { showToast('Hospital and blood group required','error'); return; }
    await addDoc(collection(db,'blood_requests'), {
      hospital_name: hosp, blood_group: blood,
      units_required: parseInt(document.getElementById('rUnits').value)||1,
      priority: document.getElementById('rPrio').value,
      required_by: document.getElementById('rDate').value,
      remarks: document.getElementById('rRemarks').value,
      status:'Pending', requested_at: new Date()
    });
    closeModal('reqModal');
    showToast('Blood request submitted!');
  };

  window.fulfilReq = async (id) => {
    await updateDoc(doc(db,'blood_requests',id), { status:'Fulfilled' });
    showToast('Request fulfilled!');
  };

  window.prefillRequest = (name) => {
    document.getElementById('rHosp').value = name;
    openModal('reqModal');
  };

  function showToast(msg,type='success'){
    const c=type==='success'?{bg:'rgba(46,204,113,.15)',b:'rgba(46,204,113,.4)',color:'#2ECC71'}:{bg:'rgba(200,16,46,.15)',b:'rgba(200,16,46,.4)',color:'#FF4D6D'};
    const t=document.createElement('div');
    t.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:9999;padding:13px 20px;border-radius:8px;font-size:13px;font-weight:600;background:${c.bg};border:1px solid ${c.b};color:${c.color};font-family:'DM Sans',sans-serif;`;
    t.textContent=(type==='success'?'✓ ':'✕ ')+msg;document.body.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},3000);
  }
  window.openModal = id => document.getElementById(id)?.classList.add('open');
  window.closeModal= id => document.getElementById(id)?.classList.remove('open');
  document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
}); // end initPage
</script>
</body>
</html>
