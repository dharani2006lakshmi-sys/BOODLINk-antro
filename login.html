<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeFlow · Login</title>
  <style>
/* ═══════════════════════════════════════
   LifeFlow — Blood Bank Management System
   assets/css/style.css
═══════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

/* ─── CSS VARIABLES ─── */
:root {
  --red:      #C8102E;
  --red-dark: #8B0000;
  --red-light:#FF4D6D;
  --bg:       #0A0A0B;
  --surface:  #131316;
  --surface2: #1C1C21;
  --border:   rgba(200,16,46,0.2);
  --text:     #F0EEE9;
  --muted:    #7A7880;
  --green:    #2ECC71;
  --yellow:   #F1C40F;
  --blue:     #3498DB;
}

/* ─── RESET ─── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
a { text-decoration:none; color:inherit; }
button { font-family:'DM Sans',sans-serif; }

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
.app  { display:flex; min-height:100vh; }
.main { flex:1; margin-left:240px; display:flex; flex-direction:column; min-height:100vh; }

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
.sidebar {
  width:240px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0;
  height:100vh;
  z-index:100;
}

.sidebar-logo {
  padding:22px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
}
.logo-icon {
  width:36px; height:36px;
  background:var(--red);
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  flex-shrink:0;
}
.logo-text { font-family:'Bebas Neue'; font-size:22px; letter-spacing:2px; }

.sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
.nav-section  { margin-bottom:22px; }
.nav-label    { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; padding:0 8px; margin-bottom:8px; display:block; }

.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px;
  color:var(--muted); font-size:13px; font-weight:500;
  transition:background .15s, color .15s;
  margin-bottom:2px;
  cursor:pointer;
}
.nav-item:hover  { background:var(--surface2); color:var(--text); }
.nav-item.active { background:rgba(200,16,46,0.12); color:var(--red-light); }
.nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }

.sidebar-user {
  padding:14px 18px;
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.user-avatar {
  width:32px; height:32px;
  background:var(--red); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px; flex-shrink:0;
}
.user-info { flex:1; min-width:0; }
.user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-role { font-size:11px; color:var(--muted); }
.logout-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; transition:color .2s; flex-shrink:0; }
.logout-btn:hover { color:var(--red-light); }

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
.topbar {
  padding:16px 28px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:10;
}
.page-title    { font-family:'Bebas Neue'; font-size:26px; letter-spacing:2px; }
.page-subtitle { font-size:12px; color:var(--muted); margin-top:2px; }
.topbar-actions { display:flex; gap:10px; align-items:center; }

/* ════════════════════════════════════════
   CONTENT AREA
════════════════════════════════════════ */
.content { flex:1; padding:28px; overflow-y:auto; }

/* ════════════════════════════════════════
   BUTTONS
════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 18px; border-radius:8px; border:none;
  cursor:pointer; font-weight:600; font-size:13px;
  transition:all .2s; text-decoration:none; white-space:nowrap;
}
.btn-primary { background:var(--red); color:#fff; }
.btn-primary:hover { background:#e8102e; transform:translateY(-1px); box-shadow:0 8px 20px rgba(200,16,46,.35); }

.btn-outline { background:transparent; color:var(--text); border:1px solid rgba(255,255,255,0.15); }
.btn-outline:hover { border-color:var(--red); color:var(--red-light); }

.btn-green  { background:rgba(46,204,113,.15); color:var(--green); border:1px solid rgba(46,204,113,.3); }
.btn-green:hover { background:rgba(46,204,113,.25); }

.btn-danger { background:rgba(200,16,46,.12); color:var(--red-light); border:1px solid rgba(200,16,46,.3); }
.btn-danger:hover { background:rgba(200,16,46,.22); }

.btn-sm  { padding:6px 13px; font-size:12px; }
.btn-xs  { padding:4px 9px;  font-size:11px; }
.btn-full{ width:100%; }

/* ════════════════════════════════════════
   CARDS
════════════════════════════════════════ */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:22px;
}
.card + .card { margin-top:16px; }
.card-title {
  font-size:13px; font-weight:600;
  margin-bottom:16px;
  display:flex; justify-content:space-between; align-items:center; gap:12px;
}

/* ════════════════════════════════════════
   STAT CARDS
════════════════════════════════════════ */
.stat-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px; padding:20px;
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
  background:var(--red);
}
.stat-card.green::before  { background:var(--green); }
.stat-card.blue::before   { background:var(--blue); }
.stat-card.yellow::before { background:var(--yellow); }

.stat-icon  { position:absolute; right:16px; top:16px; font-size:26px; opacity:.15; pointer-events:none; }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.stat-value { font-family:'Bebas Neue'; font-size:38px; line-height:1; }
.stat-unit  { font-size:12px; color:var(--muted); margin-top:4px; }

/* ════════════════════════════════════════
   GRID LAYOUTS
════════════════════════════════════════ */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.grid-2     { display:grid; grid-template-columns:1fr 1fr;          gap:16px; margin-bottom:16px; }
.grid-3     { display:grid; grid-template-columns:repeat(3,1fr);    gap:16px; margin-bottom:16px; }

/* ════════════════════════════════════════
   TABLE
════════════════════════════════════════ */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th {
  padding:9px 14px; text-align:left;
  color:var(--muted); font-size:11px; letter-spacing:1px; text-transform:uppercase;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody tr { border-bottom:1px solid rgba(255,255,255,.04); transition:background .15s; }
tbody tr:hover { background:var(--surface2); }
tbody td { padding:11px 14px; }

/* ════════════════════════════════════════
   BADGES
════════════════════════════════════════ */
.badge {
  display:inline-flex; align-items:center;
  padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:600; white-space:nowrap;
}
.badge-red    { background:rgba(200,16,46,.15);   color:var(--red-light); }
.badge-green  { background:rgba(46,204,113,.15);  color:var(--green); }
.badge-yellow { background:rgba(241,196,15,.15);  color:var(--yellow); }
.badge-blue   { background:rgba(52,152,219,.15);  color:var(--blue); }
.badge-muted  { background:rgba(255,255,255,.07); color:var(--muted); }

.blood-badge {
  display:inline-block;
  padding:2px 8px; border-radius:4px;
  background:rgba(200,16,46,.2); color:var(--red-light);
  font-family:'DM Mono'; font-size:12px; font-weight:500;
}

/* ════════════════════════════════════════
   ALERTS
════════════════════════════════════════ */
.alert {
  padding:11px 16px; border-radius:8px; font-size:13px;
  margin-bottom:12px; display:flex; align-items:center; gap:10px;
}
.alert-critical { background:rgba(200,16,46,.10); border:1px solid rgba(200,16,46,.3); color:var(--red-light); }
.alert-warning  { background:rgba(241,196,15,.10); border:1px solid rgba(241,196,15,.3); color:var(--yellow); }
.alert-success  { background:rgba(46,204,113,.10); border:1px solid rgba(46,204,113,.3); color:var(--green); }

/* ════════════════════════════════════════
   MODAL
════════════════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:999;
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open { display:flex; }

.modal {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px; padding:32px;
  width:500px; max-width:95vw;
  max-height:90vh; overflow-y:auto;
  animation:slideUp .3s ease;
}
.modal-title {
  font-size:17px; font-weight:700;
  margin-bottom:22px;
  display:flex; justify-content:space-between; align-items:center;
}
.modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; transition:color .2s; }
.modal-close:hover { color:var(--text); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }

/* ════════════════════════════════════════
   FORMS
════════════════════════════════════════ */
.form-group { margin-bottom:16px; }
.form-group label {
  font-size:11px; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase;
  display:block; margin-bottom:7px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width:100%;
  background:var(--surface2);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px; padding:11px 14px;
  color:var(--text); font-family:'DM Sans'; font-size:13px;
  outline:none; transition:border .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color:var(--red); }
.form-group select option { background:var(--surface2); }
.form-group textarea { resize:vertical; min-height:80px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

/* ════════════════════════════════════════
   PROGRESS BARS
════════════════════════════════════════ */
.progress { height:5px; background:var(--surface2); border-radius:3px; }
.progress-fill { height:5px; border-radius:3px; background:var(--red); transition:width .6s ease; }
.progress-fill.green  { background:var(--green); }
.progress-fill.blue   { background:var(--blue); }
.progress-fill.yellow { background:var(--yellow); }

/* ════════════════════════════════════════
   BLOOD GROUP INVENTORY GRID
════════════════════════════════════════ */
.blood-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.blood-cell { background:var(--surface2); border-radius:8px; padding:12px 8px; text-align:center; }
.blood-type  { font-family:'Bebas Neue'; font-size:22px; color:var(--red-light); }
.blood-units { font-size:11px; color:var(--muted); margin-top:2px; }
.blood-bar   { height:3px; background:var(--bg); border-radius:2px; margin-top:6px; }
.blood-fill  { height:3px; background:var(--red); border-radius:2px; }

/* ════════════════════════════════════════
   VITALS CARDS
════════════════════════════════════════ */
.vital-card  { background:var(--surface2); border-radius:10px; padding:16px; border:1px solid transparent; transition:border .3s; }
.vital-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.vital-value { font-family:'Bebas Neue'; font-size:30px; line-height:1; }
.vital-unit  { font-size:11px; color:var(--muted); margin-top:2px; }
.vital-status { margin-top:6px; }

/* ════════════════════════════════════════
   LEADERBOARD ROW
════════════════════════════════════════ */
.leaderboard-row { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--surface2); border-radius:8px; }
.rank { font-family:'Bebas Neue'; font-size:24px; width:28px; flex-shrink:0; }

/* ════════════════════════════════════════
   LOGIN PAGE
════════════════════════════════════════ */
.login-page {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
}
.login-bg {
  position:fixed; inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,16,46,.15) 0%, transparent 70%);
  pointer-events:none;
}
.login-bg::after {
  content:'LifeFlow';
  position:absolute; font-family:'Bebas Neue'; font-size:28vw;
  color:rgba(200,16,46,.03);
  top:50%; left:50%; transform:translate(-50%,-50%);
  white-space:nowrap; pointer-events:none;
}
.login-card {
  position:relative; z-index:1;
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:48px; width:420px; max-width:95vw;
  box-shadow:0 40px 80px rgba(0,0,0,.6);
  animation:slideUp .5s ease;
}
.login-logo { display:flex; align-items:center; gap:12px; margin-bottom:30px; }
.login-logo .logo-icon { width:46px; height:46px; border-radius:10px; font-size:24px; }
.login-logo .logo-text { font-family:'Bebas Neue'; font-size:30px; letter-spacing:3px; }
.login-title    { font-size:22px; font-weight:600; margin-bottom:6px; }
.login-subtitle { color:var(--muted); font-size:13px; margin-bottom:28px; }
.login-links { margin-top:20px; display:flex; flex-direction:column; gap:6px; text-align:center; }
.login-links a { font-size:12px; color:var(--muted); }
.login-links a:hover { color:var(--red-light); }
.login-demo { margin-top:14px; text-align:center; font-size:12px; color:var(--muted); }

/* ════════════════════════════════════════
   REPORT PAGE EXTRAS
════════════════════════════════════════ */
.report-header { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:20px; }
.report-title  { font-family:'Bebas Neue'; font-size:30px; letter-spacing:2px; color:var(--red-light); }
.report-meta   { font-size:12px; color:var(--muted); margin-top:4px; }
.filter-row    { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; align-items:flex-end; }
.filter-group  { display:flex; flex-direction:column; gap:4px; }
.filter-group label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.filter-group select,
.filter-group input {
  background:var(--surface2); border:1px solid rgba(255,255,255,.1);
  border-radius:6px; padding:8px 12px; color:var(--text); font-size:13px; outline:none;
}

/* ════════════════════════════════════════
   AUDIT LOG ROW
════════════════════════════════════════ */
.audit-row {
  padding:8px 10px; background:var(--surface2); border-radius:6px;
  display:flex; gap:10px; font-size:12px; align-items:flex-start;
}
.audit-time { color:var(--muted); white-space:nowrap; flex-shrink:0; }

/* ════════════════════════════════════════
   SCROLLBAR
════════════════════════════════════════ */
::-webkit-scrollbar       { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:rgba(200,16,46,.4); }

/* ════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════ */
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media (max-width:1100px) {
  .stats-grid { grid-template-columns:repeat(2,1fr); }
}
@media (max-width:860px) {
  .grid-2, .grid-3 { grid-template-columns:1fr; }
  .sidebar { transform:translateX(-100%); transition:transform .3s; }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; }
}
@media (max-width:500px) {
  .stats-grid { grid-template-columns:1fr; }
  .form-row   { grid-template-columns:1fr; }
  .content    { padding:16px; }
  .topbar     { padding:12px 16px; }
}

/* SPINNER */
.spinner { display:inline-block;width:20px;height:20px;border:2px solid rgba(200,16,46,.3);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

  .btn-google { background:var(--surface2); color:var(--text); border:1px solid rgba(255,255,255,.12); width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:12px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; font-family:"DM Sans",sans-serif; }

  .btn-google img { width:18px; height:18px; }
  .error-box { background:rgba(200,16,46,.1); border:1px solid rgba(200,16,46,.3); color:#FF4D6D; padding:11px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
  .success-box { background:rgba(46,204,113,.1); border:1px solid rgba(46,204,113,.3); color:#2ECC71; padding:11px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
  .login-footer { margin-top:18px; text-align:center; font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:8px; }
  .login-footer a { color:var(--red-light); text-decoration:none; }
  .login-footer a:hover { text-decoration:underline; }
  .spinner-inline { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .config-warning { background:rgba(241,196,15,.1); border:1px solid rgba(241,196,15,.3); color:#F1C40F; padding:11px 14px; border-radius:8px; font-size:12px; margin-bottom:16px; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🩸</div>
      <div class="logo-text">LifeFlow</div>
    </div>
    <div class="login-title">Welcome Back</div>
    <div class="login-subtitle">Blood Bank Management System &nbsp;·&nbsp; Firebase</div>

    <!-- CONFIG WARNING (shown if placeholder keys detected) -->
    <div class="config-warning" id="configWarn" style="display:none">
      ⚠ Firebase config not set. Open <strong>assets/js/firebase-config.js</strong> and add your project keys.
      <a href="https://console.firebase.google.com" target="_blank" style="color:var(--yellow)">Open Firebase Console →</a>
    </div>

    <!-- ERROR / SUCCESS BOXES -->
    <div class="error-box"   id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <!-- GOOGLE SIGN IN -->
    <button class="btn-google" id="googleBtn" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or sign in with email</div>

    <!-- EMAIL / PASSWORD FORM -->
    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="admin@lifeflow.org" value="admin@lifeflow.org" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" value="admin123" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="admin">Administrator</option>
        <option value="donor">Donor</option>
        <option value="hospital">Hospital Staff</option>
      </select>
    </div>

    <button id="loginBtn" class="btn btn-primary btn-full" onclick="doLogin()">Sign In &nbsp;→</button>

    <div class="login-footer">
      <span>First time? <a href="#" onclick="doRegister()">Create admin account</a></span>
      <a href="#" onclick="doSeed()" style="color:var(--muted);font-size:11px">🌱 Seed sample data into Firebase</a>
    </div>
  </div>
</div>

<!-- Bridge: makes module functions available to onclick handlers -->
<script>
function doLogin()       { if(window.doLogin)       window.doLogin();       }
function doGoogleLogin() { if(window.doGoogleLogin) window.doGoogleLogin(); }
function doRegister()    { if(window.doRegister)    window.doRegister();    }
function doSeed()        { if(window.doSeed)        window.doSeed();        }
</script>
<script type="module">
  // ── Import Firebase ────────────────────────────────
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, addDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── Load Firebase config from file ────────────────
  // 👉 EDIT assets/js/firebase-config.js with your keys!
  let app, db, auth;

  async function initFirebase() {
    try {
      const mod = await import('./assets/js/firebase-config.js');
      db   = mod.db;
      auth = mod.auth;

      // Check if placeholder config
      const cfg = auth.app.options;
      if (cfg.apiKey === 'YOUR_API_KEY' || !cfg.apiKey) {
        document.getElementById('configWarn').style.display = 'block';
        return false;
      }
      return true;
    } catch(e) {
      showError('Firebase config error: ' + e.message + ' — Check assets/js/firebase-config.js');
      return false;
    }
  }

  // ── UI Helpers ─────────────────────────────────────
  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.innerHTML = '⚠ ' + msg;
    b.style.display = 'block';
    document.getElementById('successBox').style.display = 'none';
  }
  function showSuccess(msg) {
    const b = document.getElementById('successBox');
    b.innerHTML = '✓ ' + msg;
    b.style.display = 'block';
    document.getElementById('errorBox').style.display = 'none';
  }
  function hideMessages() {
    document.getElementById('errorBox').style.display   = 'none';
    document.getElementById('successBox').style.display = 'none';
  }
  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    btn.disabled    = loading;
    btn.innerHTML   = loading ? '<span class="spinner-inline"></span> Signing in…' : 'Sign In &nbsp;→';
    const gBtn = document.getElementById('googleBtn');
    gBtn.disabled   = loading;
  }

  // ── Error code → human message ─────────────────────
  function firebaseError(code) {
    const map = {
      'auth/user-not-found':        '❌ No account found. Use "Create admin account" first.',
      'auth/wrong-password':        '❌ Incorrect password. Try again.',
      'auth/invalid-credential':    '❌ Invalid email or password.',
      'auth/invalid-email':         '❌ Invalid email address format.',
      'auth/too-many-requests':     '⏳ Too many attempts. Wait a few minutes.',
      'auth/email-already-in-use':  '⚠ This email already has an account. Try signing in.',
      'auth/weak-password':         '⚠ Password must be at least 6 characters.',
      'auth/network-request-failed':'🌐 Network error. Check your internet connection.',
      'auth/popup-closed-by-user':  '⚠ Google sign-in popup was closed.',
      'auth/popup-blocked':         '⚠ Popup blocked. Allow popups for this site.',
      'auth/operation-not-allowed': '⚠ This sign-in method is not enabled in Firebase Console.',
    };
    return map[code] || ('Error: ' + code);
  }

  // ── SIGN IN WITH EMAIL ─────────────────────────────
  window.doLogin = async () => {
    hideMessages();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const role     = document.getElementById('role').value;

    if (!email)    { showError('Please enter your email address.'); return; }
    if (!password) { showError('Please enter your password.'); return; }

    setLoading(true);
    const ok = await initFirebase();
    if (!ok) { setLoading(false); return; }

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      sessionStorage.setItem('bbms_role', role);
      sessionStorage.setItem('bbms_user', cred.user.email);
      sessionStorage.setItem('bbms_uid',  cred.user.uid);
      showSuccess('Login successful! Redirecting…');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch (err) {
      showError(firebaseError(err.code));
      setLoading(false);
    }
  };

  // ── SIGN IN WITH GOOGLE ────────────────────────────
  window.doGoogleLogin = async () => {
    hideMessages();
    const ok = await initFirebase();
    if (!ok) return;

    const btn = document.getElementById('googleBtn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner-inline"></span> Opening Google…';

    try {
      const provider = new GoogleAuthProvider();
      const cred     = await signInWithPopup(auth, provider);
      const role     = document.getElementById('role').value;

      // Save user to Firestore
      await setDoc(doc(db, 'users', cred.user.uid), {
        email:      cred.user.email,
        username:   cred.user.displayName || cred.user.email,
        role:       role,
        photo:      cred.user.photoURL || '',
        created_at: new Date()
      }, { merge: true });

      sessionStorage.setItem('bbms_role', role);
      sessionStorage.setItem('bbms_user', cred.user.email);
      sessionStorage.setItem('bbms_uid',  cred.user.uid);
      showSuccess('Google sign-in successful! Redirecting…');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch (err) {
      showError(firebaseError(err.code));
      btn.disabled  = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google`;
    }
  };

  // ── CREATE ACCOUNT ─────────────────────────────────
  window.doRegister = async () => {
    hideMessages();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email)         { showError('Enter your email first.'); return; }
    if (!password)      { showError('Enter a password first.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

    const ok = await initFirebase();
    if (!ok) return;

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'users', cred.user.uid), {
        email, role:'admin', username:'Admin User', created_at: new Date()
      });
      showSuccess('✅ Account created! You can now Sign In.');
    } catch (err) {
      showError(firebaseError(err.code));
    }
  };

  // ── SEED SAMPLE DATA ───────────────────────────────
  window.doSeed = async () => {
    if (!confirm('Add sample donors, hospitals and blood inventory to Firebase?')) return;
    const ok = await initFirebase();
    if (!ok) return;

    try {
      // Blood inventory
      const inv = [
        {blood_group:'A+',units:142},{blood_group:'A-',units:38},
        {blood_group:'B+',units:186},{blood_group:'B-',units:24},
        {blood_group:'AB+',units:67},{blood_group:'AB-',units:19},
        {blood_group:'O+',units:359},{blood_group:'O-',units:12},
      ];
      for (const i of inv) {
        await setDoc(doc(db,'inventory',i.blood_group), i);
      }
      // Sample donors
      const donors = [
        {name:'Ravi Kumar', age:28, gender:'Male',   blood_group:'B+',  phone:'+91 98765 11111', status:'Eligible', created_at:new Date()},
        {name:'Priya Nair', age:34, gender:'Female', blood_group:'O+',  phone:'+91 87654 22222', status:'Eligible', created_at:new Date()},
        {name:'Arun Sharma',age:22, gender:'Male',   blood_group:'A+',  phone:'+91 76543 33333', status:'Eligible', created_at:new Date()},
        {name:'Deepa Raj',  age:29, gender:'Female', blood_group:'AB+', phone:'+91 65432 44444', status:'Waiting',  created_at:new Date()},
        {name:'Kavitha S.', age:26, gender:'Female', blood_group:'O-',  phone:'+91 43210 66666', status:'Eligible', created_at:new Date()},
      ];
      for (const d of donors) await addDoc(collection(db,'donors'), d);
      // Hospitals
      const hospitals = [
        {name:'City General Hospital',   district:'Chennai Central', phone:'044-2200-1111', status:'Active', created_at:new Date()},
        {name:'Apollo Hospitals',         district:'Greams Road',    phone:'044-2829-0000', status:'Active', created_at:new Date()},
        {name:'MIOT International',       district:'Manapakkam',     phone:'044-4200-2288', status:'Active', created_at:new Date()},
      ];
      for (const h of hospitals) await addDoc(collection(db,'hospitals'), h);
      showSuccess('✅ Sample data added to Firebase successfully!');
    } catch(e) {
      showError('Seed failed: ' + e.message);
    }
  };

  // ── Enter key to submit ────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });

  // ── Auto redirect if already logged in ────────────
  (async () => {
    const ok = await initFirebase();
    if (!ok) return;
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });
  })();
</script>
</body>
</html>
